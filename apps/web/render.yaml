# Render Web Service - Next.js Frontend
# https://render.com/docs/deploy-a-next-js-app

services:
  - type: web
    name: freebuffgame-web
    env: node
    region: oregon
    plan: free
    rootDir: apps/web
    # Copy prisma schema from API before generating client
    buildCommand: cp -r ../api/prisma ./prisma-copy && npm install prisma@5.22.0 @prisma/client@5.22.0 && npx prisma@5.22.0 generate --schema=./prisma-copy/schema.prisma && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://freebuffgame-api.onrender.com/api
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: NEXT_PUBLIC_CLERK_SIGN_IN_URL
        value: /login
      - key: NEXT_PUBLIC_CLERK_SIGN_UP_URL
        value: /register
      - key: NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL
        value: /dashboard
      - key: NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL
        value: /dashboard
      - key: NEXT_PUBLIC_VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      # Inngest (if using background jobs)
      - key: INNGEST_EVENT_KEY
        sync: false
      - key: INNGEST_SIGNING_KEY
        sync: false